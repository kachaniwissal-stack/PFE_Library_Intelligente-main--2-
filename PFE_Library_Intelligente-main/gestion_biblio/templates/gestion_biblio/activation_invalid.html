{% extends "gestion_biblio/base.html" %}

{% block content %}
<div class="container mt-5 text-center" data-aos="zoom-in">
    <div class="alert alert-danger p-5 rounded-4 shadow-lg border-0">
        <div class="mb-4">
            <i class="fas fa-exclamation-circle fa-5x animate__animated animate__pulse animate__infinite"></i>
        </div>
        <h2 class="fw-bold">Lien d'activation invalide ❌</h2>
        <p class="fs-5 text-muted mt-3">
            Désolé أ الزين، هاد الرابط مابقاش خدام (إما قديم أو ديجا استعملتيه). <br>
            حاولي تسجلي من جديد أو دخلي للحساب ديالك إلا كان ديجا مفعل.
        </p>
        <div class="mt-5">
            <a href="{% url 'register' %}" class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow">
                S'inscrire à nouveau
            </a>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4 ms-3">Retour</a>
        </div>
    </div>
</div>
{% endblock %}
