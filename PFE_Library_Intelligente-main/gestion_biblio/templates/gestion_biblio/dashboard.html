{% extends "gestion_biblio/base.html" %}

{% block content %}
<style>
    /* --- جعل الخلفية باهتة لتركيز الانتباه --- */
    #main-bg { filter: brightness(0.8) contrast(0.9) blur(2px) !important; }

    .dash-container { padding-top: 20px; }

    /* كروت الإحصائيات فـ المود العادي */
    .stat-card-premium {
        background: white;
        border-radius: 24px;
        padding: 30px;
        border: none;
        box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        transition: 0.3s;
        text-align: left;
    }
    .stat-card-premium:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(79, 70, 229, 0.1); }
    
    .icon-circle {
        width: 50px; height: 50px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: #efebe9 !important; /* خلفية كريمية فاتحة */
        color: #5d4037 !important; /* أيقونة بنية */
        margin-bottom: 15px;
        font-size: 1.2rem;
    }

    .label-premium { color: #8e9aaf; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
    .value-premium { color: #1e293b; font-size: 2.5rem; font-weight: 800; display: block; line-height: 1; }

    /* كروت المبيانات */
    .chart-card-premium {
        background: white;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        border: none;
        margin-bottom: 30px;
    }
    
    .chart-title { font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
    .chart-title i { color: #8d6e63 !important; }

    /* --- تصحيح المود سومبر للـ Dashboard --- */
    body.dark-mode .stat-card-premium, 
    body.dark-mode .chart-card-premium {
        background: rgba(45, 27, 23, 0.95) !important; /* بني ليلي غامق */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    body.dark-mode .stat-value, 
    body.dark-mode .chart-title,
    body.dark-mode .value-premium {
        color: #f8fafc !important; /* لون أبيض كريمي */
    }

    body.dark-mode .label-premium {
        color: #d7ccc8 !important;
    }

    body.dark-mode .icon-circle {
        background: rgba(255, 255, 255, 0.1) !important;
        color: #fbbf24 !important; /* أيقونة ذهبية فـ الليل */
    }

    body.dark-mode .dash-container { background: transparent !important; }

</style>

<div class="container dash-container" data-aos="fade-up">
    <!-- 1. Top Section: Big Numbers -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="stat-card-premium">
                <div class="icon-circle"><i class="fas fa-book-open"></i></div>
                <span class="label-premium">Livres dans la base</span>
                <span class="value-premium">{{ total }}</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card-premium">
                <div class="icon-circle" style="color:#10b981;"><i class="fas fa-check-circle"></i></div>
                <span class="label-premium">Disponibles</span>
                <span class="value-premium" style="color:#10b981;">{{ disponibles }}</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card-premium">
                <div class="icon-circle" style="color:#f59e0b;"><i class="fas fa-user-clock"></i></div>
                <span class="label-premium">Emprunts actifs</span>
                <span class="value-premium" style="color:#f59e0b;">{{ empruntes }}</span>
            </div>
        </div>
    </div>

    <!-- 2. Bottom Section: Charts -->
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="chart-card-premium h-100">
                <h5 class="chart-title"><i class="fas fa-chart-bar"></i> Statistiques par Catégorie</h5>
                <div style="height: 350px;"><canvas id="cleanBarChart"></canvas></div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="chart-card-premium h-100">
                <h5 class="chart-title"><i class="fas fa-chart-pie"></i> Répartition</h5>
                <div style="height: 350px;"><canvas id="cleanPieChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const labels = {{ labels_js|safe }};
    const dataValues = {{ data_js|safe }};

    const marronPalette = ['#3e2723', '#5d4037', '#8d6e63', '#a1887f', '#bcaaa4', '#d7ccc8'];

    // 1. Bar Chart
    new Chart(document.getElementById('cleanBarChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Ouvrages',
                data: dataValues,
                backgroundColor: '#8d6e63',
                borderRadius: 10,
                barThickness: 25,
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { display: false } },
                x: { grid: { display: false } }
            }
        }
    });

    // 2. Pie Chart
    new Chart(document.getElementById('cleanPieChart'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: dataValues,
                backgroundColor: marronPalette,
                borderWidth: 2,
                borderColor: '#ffffff',
                hoverOffset: 15
            }]
        },
        options: {
            maintainAspectRatio: false,
            cutout: '75%',
            plugins: { legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true } } }
        }
    });
});
</script>
{% endblock %}
