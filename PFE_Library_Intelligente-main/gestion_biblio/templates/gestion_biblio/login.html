{% extends "gestion_biblio/base.html" %}

{% block content %}
<style>
    .auth-card {
        border-radius: 40px; border: none; background: white;
        box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08);
        overflow: hidden; max-width: 450px; margin: 40px auto;
    }
    .auth-header { padding: 50px 40px 20px; text-align: center; }
    .auth-body { padding: 20px 50px 50px; }
    
    .brand-icon {
        width: 70px; height: 70px; background: #4f46e5;
        color: white; border-radius: 22px; display: inline-flex;
        align-items: center; justify-content: center; margin-bottom: 25px;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
    }

    .form-control-premium {
        background: #f8fafc !important; border: 1.5px solid #f1f5f9 !important;
        border-radius: 18px !important; padding: 15px 20px !important;
        font-weight: 500; transition: 0.3s;
    }

    /* --- هادا هو البوطون لي صلحنا أ وصال --- */
    .btn-login-premium {
        background: #4f46e5 !important; /* لون أزرق ملكي وااااضح */
        color: white !important; /* كتابة بيضا */
        border: none;
        border-radius: 18px;
        padding: 16px;
        font-weight: 700;
        width: 100%;
        transition: 0.4s;
        margin-top: 20px;
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        cursor: pointer;
    }

    .btn-login-premium:hover {
        background: #4338ca !important; /* كيولي أزرق مغلوق شوية عند التمرير */
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
    }
</style>

<div class="container" data-aos="zoom-in">
    <div class="card auth-card">
        <div class="auth-header">
            <div class="brand-icon"><i class="fas fa-fingerprint fa-2x"></i></div>
            <h2 class="fw-bold text-dark">Connexion</h2>
            <p class="text-muted small">Accédez à votre bibliothèque intelligente</p>
        </div>

        <div class="auth-body">
            {% if form.errors %}
                <div class="alert alert-danger border-0 rounded-4 small py-2 text-center">Identifiants incorrects.</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control-premium" placeholder="Ex: atif" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Mot de passe</label>
                    <input type="password" name="password" class="form-control-premium" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-login-premium shadow">Se connecter <i class="fas fa-arrow-right ms-2"></i></button>
            </form>

            <div class="text-center mt-5">
                <p class="small text-muted mb-0">Pas encore de compte ?</p>
                <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Créer un profil étudiant</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
