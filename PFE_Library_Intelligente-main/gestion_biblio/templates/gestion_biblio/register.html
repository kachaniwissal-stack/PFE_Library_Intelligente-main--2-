{% extends "gestion_biblio/base.html" %}

{% block content %}
<style>
    .auth-card-reg {
        border-radius: 40px; border: none; background: white;
        box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08);
        overflow: hidden; max-width: 550px; margin: 20px auto;
    }
    .reg-header { background: #f8fafc; padding: 40px; text-align: center; border-bottom: 1px solid #eee; }
    .reg-body { padding: 40px 50px; }
</style>

<div class="container" data-aos="fade-up">
    <div class="card auth-card-reg">
        <div class="reg-header">
            <h2 class="fw-bold text-dark mb-1">Inscription Étudiant</h2>
            <p class="text-muted small mb-0">Remplissez vos informations pour commencer</p>
        </div>

        <div class="reg-body">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<small class="text-danger d-block mt-1">{{ error }}</small>{% endfor %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-login-premium shadow">S'inscrire et commencer <i class="fas fa-check-circle ms-2"></i></button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-muted small text-decoration-none">← Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('input, select').forEach(el => el.classList.add('form-control-premium'));
</script>
{% endblock %}
